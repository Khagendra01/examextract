<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamExtract</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0c0e14;
            color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container { max-width: 600px; width: 100%; }
        .logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #e8a23a, #d4882a);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: #0c0e14;
            margin-bottom: 24px;
        }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        h1 span { color: #e8a23a; }
        p { color: #8b92a5; font-size: 14px; margin-bottom: 32px; }
        .upload-zone {
            border: 2px dashed #2a2d3a;
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #13161f;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #e8a23a;
            background: #1a1d2a;
        }
        .upload-icon { font-size: 32px; margin-bottom: 12px; }
        .upload-text { font-size: 14px; color: #f0f2f5; margin-bottom: 4px; }
        .upload-hint { font-size: 12px; color: #505770; }
        .upload-text span { color: #e8a23a; font-weight: 600; }
        #fileInput { display: none; }
        .files { margin-top: 16px; }
        .file-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            background: #0f1219;
            border: 1px solid #1a1d2a;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { color: #505770; font-size: 11px; }
        .remove { background: none; border: none; color: #505770; cursor: pointer; font-size: 16px; }
        .remove:hover { color: #f87171; }

        /* Orientation selector */
        .format-section { margin-top: 20px; }
        .format-label { font-size: 13px; color: #8b92a5; margin-bottom: 10px; }
        .format-options { display: flex; gap: 10px; }
        .format-option {
            flex: 1;
            padding: 14px 16px;
            background: #0f1219;
            border: 2px solid #1a1d2a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .format-option:hover { border-color: #2a2d3a; }
        .format-option.active { border-color: #e8a23a; background: #1a1d2a; }
        .format-icon { font-size: 24px; margin-bottom: 6px; }
        .format-name { font-size: 13px; font-weight: 600; color: #f0f2f5; }
        .format-desc { font-size: 11px; color: #505770; margin-top: 2px; }
        .format-option input { display: none; }

        .btn {
            width: 100%; height: 48px;
            border: none; border-radius: 12px;
            font-family: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; margin-top: 16px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e8a23a, #d4882a);
            color: #0c0e14;
        }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(232,162,58,0.3); }
        .btn-primary:disabled { background: #1f2433; color: #505770; cursor: not-allowed; }
        .btn-primary.loading { background: #1f2433; color: transparent; position: relative; }
        .btn-primary.loading::after {
            content: ''; position: absolute;
            top: 50%; left: 50%; width: 20px; height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid #2a2d3a; border-top-color: #e8a23a;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg {
            padding: 14px 16px; border-radius: 8px;
            margin-top: 16px; font-size: 13px; display: none;
        }
        .msg.error { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
        .msg.success { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
        .msg.active { display: block; }
        .footer { margin-top: 40px; text-align: center; color: #505770; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">E</div>
        <h1>Transform exam papers<br>into <span>documents</span></h1>
        <p>Upload images of exam papers and get a formatted DOCX instantly.</p>

        <div class="upload-zone" id="dropZone">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Drop images here or <span>browse</span></div>
            <div class="upload-hint">JPG, PNG, WEBP — up to 16MB each</div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="files" id="fileList"></div>

        <div class="format-section">
            <div class="format-label">Output format</div>
            <div class="format-options">
                <label class="format-option active" id="opt-landscape">
                    <input type="radio" name="orientation" value="landscape" checked>
                    <div class="format-icon">▬</div>
                    <div class="format-name">Landscape</div>
                    <div class="format-desc">2-column, compact — for MCQ exams</div>
                </label>
                <label class="format-option" id="opt-portrait">
                    <input type="radio" name="orientation" value="portrait">
                    <div class="format-icon">▮</div>
                    <div class="format-name">Portrait</div>
                    <div class="format-desc">1-column, readable — for descriptive exams</div>
                </label>
            </div>
        </div>

        <div class="format-section">
            <div class="format-label">AI Model</div>
            <div class="format-options">
                <label class="format-option active" id="opt-mimo">
                    <input type="radio" name="model" value="mimo" checked>
                    <div class="format-icon">⚡</div>
                    <div class="format-name">Mimo v2.5</div>
                    <div class="format-desc">OpenRouter — reliable structured extraction</div>
                </label>
                <label class="format-option" id="opt-gemini">
                    <input type="radio" name="model" value="gemini">
                    <div class="format-icon">✦</div>
                    <div class="format-name">Gemini Flash</div>
                    <div class="format-desc">Google AI Studio — fast with free tier</div>
                </label>
            </div>
        </div>

        <button class="btn btn-primary" id="extractBtn" disabled>
            <span id="btnText">Extract & Download DOCX</span>
        </button>

        <div class="msg error" id="errorMsg"></div>
        <div class="msg success" id="successMsg"></div>

        <div class="footer">Structured extraction via Mimo v2.5 / Gemini Flash — OpenRouter + Google AI Studio</div>
    </div>

    <script>
        let files = [];
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const extractBtn = document.getElementById('extractBtn');
        const btnText = document.getElementById('btnText');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Format selector
        document.querySelectorAll('.format-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.format-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                opt.querySelector('input').checked = true;
            });
        });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            addFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });

        function addFiles(newFiles) {
            for (const f of newFiles) {
                if (f.type.startsWith('image/') && !files.find(x => x.name === f.name && x.size === f.size)) {
                    files.push(f);
                }
            }
            updateUI();
        }

        function updateUI() {
            fileList.innerHTML = '';
            files.forEach((f, i) => {
                fileList.innerHTML += `
                    <div class="file-item">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${(f.size/1024).toFixed(0)} KB</div>
                        <button class="remove" onclick="removeFile(${i})">×</button>
                    </div>`;
            });
            extractBtn.disabled = !files.length;
            btnText.textContent = files.length
                ? `Extract & Download DOCX (${files.length} file${files.length > 1 ? 's' : ''})`
                : 'Extract & Download DOCX';
        }

        function removeFile(i) { files.splice(i, 1); updateUI(); }

        extractBtn.addEventListener('click', async () => {
            if (!files.length) return;

            const orientation = document.querySelector('input[name="orientation"]:checked').value;
            const model = document.querySelector('input[name="model"]:checked').value;

            errorMsg.classList.remove('active');
            successMsg.classList.remove('active');
            extractBtn.classList.add('loading');
            extractBtn.disabled = true;
            btnText.textContent = 'Processing...';

            const form = new FormData();
            files.forEach(f => form.append('images', f));
            form.append('orientation', orientation);
            form.append('model', model);

            try {
                const resp = await fetch('/api/extract', { method: 'POST', body: form });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Extraction failed');
                }

                const data = await resp.json();

                if (data.status === 'ok' && data.docx_base64) {
                    // Decode base64 and download
                    const binaryStr = atob(data.docx_base64);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++) {
                        bytes[i] = binaryStr.charCodeAt(i);
                    }
                    const blob = new Blob([bytes], {
                        type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
                    });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = data.filename || 'exam_extract.docx';
                    document.body.appendChild(a);
                    a.click();
                    URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    successMsg.textContent = `${orientation.charAt(0).toUpperCase() + orientation.slice(1)} DOCX downloaded!`;
                    successMsg.classList.add('active');
                    files = [];
                    updateUI();
                } else {
                    throw new Error(data.error || 'No DOCX in response');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.add('active');
            } finally {
                extractBtn.classList.remove('loading');
                extractBtn.disabled = false;
                btnText.textContent = files.length
                    ? `Extract & Download DOCX (${files.length} file${files.length > 1 ? 's' : ''})`
                    : 'Extract & Download DOCX';
            }
        });
    </script>
</body>
</html>
